name: Release

# Protocol:
#   - Every merge to main: run /qa and /security locally, commit versioned reports
#   - tag: reads current version from plugin.json, bumps to next_version,
#     tags the parent commit (which has the code, correct version, and reports)
#   - publish: reads reports from the tag, verifies gates pass, updates marketplace
#   - rollback: reverts marketplace ref to a previous tag

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Release step to run"
        required: true
        type: choice
        options:
          - tag
          - publish
          - rollback
      next_version:
        description: "Next development version (for tag action, e.g. 0.6.0)"
        required: false
        type: string
      version:
        description: "Version to publish or roll back to (for publish/rollback)"
        required: false
        type: string

jobs:
  # --- Tag: bump to next version, tag parent as current version ---
  tag:
    if: inputs.action == 'tag'
    runs-on: ubuntu-latest
    env:
      NEXT_VERSION: ${{ inputs.next_version }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate inputs
        run: |
          if [ -z "$NEXT_VERSION" ]; then
            echo "::error::next_version is required for tag action"
            exit 1
          fi
          if ! echo "$NEXT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid next_version format. Use semver: X.Y.Z"
            exit 1
          fi

      - name: Read current version
        run: |
          VERSION=$(jq -r .version .claude-plugin/plugin.json)
          echo "CURRENT_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Current version: $VERSION"

      - name: Check tag does not already exist
        run: |
          TAG="v$CURRENT_VERSION"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists."
            echo "SKIP_TAG=true" >> "$GITHUB_ENV"
          fi

      - name: Verify versioned gate reports exist
        if: env.SKIP_TAG != 'true'
        run: |
          VERSION="$CURRENT_VERSION"
          QA="QA-REPORT-v${VERSION}.md"
          SEC="SECURITY-v${VERSION}.md"
          if [ ! -f "$QA" ]; then
            echo "::error::$QA not found. Run /qa and commit the report first."
            exit 1
          fi
          if [ ! -f "$SEC" ]; then
            echo "::error::$SEC not found. Run /security and commit the report first."
            exit 1
          fi
          # Verify QA passes
          STATUS=$(grep -m1 'Overall status' "$QA" | sed 's/.*: *//')
          if ! echo "$STATUS" | grep -qiE 'PASS'; then
            echo "::error::QA status is '$STATUS', not PASS."
            exit 1
          fi
          # Verify security not blocked
          STATUS=$(grep -m1 'Overall status' "$SEC" | sed 's/.*: *//')
          if echo "$STATUS" | grep -qi 'BLOCKED'; then
            echo "::error::Security status is BLOCKED."
            exit 1
          fi
          echo "Gates verified: QA and Security pass for v${VERSION}"

      - name: Record parent commit for tagging
        if: env.SKIP_TAG != 'true'
        run: |
          echo "TAG_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Bump to next version
        if: env.SKIP_TAG != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="fix/bump-v${NEXT_VERSION}"
          git config user.name "factory-release-bot[bot]"
          git config user.email "factory-release-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          jq --arg v "$NEXT_VERSION" '.version = $v' \
            .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          git add .claude-plugin/plugin.json
          git commit -m "Bump version to $NEXT_VERSION (start v${NEXT_VERSION} development)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Start v${NEXT_VERSION} development" \
            --body "Bumps plugin.json to ${NEXT_VERSION} after tagging v$CURRENT_VERSION."
          gh pr merge "$BRANCH" --rebase --delete-branch --auto

      - name: Tag parent commit
        if: env.SKIP_TAG != 'true'
        run: |
          TAG="v$CURRENT_VERSION"
          git tag "$TAG" "$TAG_COMMIT"
          git push origin "$TAG"
          echo "### Tagged $TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: $TAG_COMMIT" >> "$GITHUB_STEP_SUMMARY"
          echo "plugin.json at tag: $CURRENT_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "Next version: $NEXT_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Next: dispatch **publish** with version **$CURRENT_VERSION**" >> "$GITHUB_STEP_SUMMARY"

  # --- Publish: verify gates from tag, update marketplace ---
  publish:
    if: inputs.action == 'publish'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate inputs
        run: |
          if [ -z "$VERSION" ]; then
            echo "::error::version is required for publish action"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format. Use semver: X.Y.Z"
            exit 1
          fi

      - name: Verify tag exists
        run: |
          if ! git tag -l "v$VERSION" | grep -q "v$VERSION"; then
            echo "::error::Tag v$VERSION does not exist. Run tag action first."
            exit 1
          fi

      - name: Verify plugin.json version in tag
        run: |
          TAG_VERSION=$(git show "v$VERSION:.claude-plugin/plugin.json" | jq -r .version)
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "::error::plugin.json in tag says $TAG_VERSION, expected $VERSION"
            exit 1
          fi

      - name: Verify QA gate from tag
        run: |
          QA="QA-REPORT-v${VERSION}.md"
          if ! git show "v$VERSION:$QA" > /dev/null 2>&1; then
            echo "::error::$QA not found in tag v$VERSION"
            exit 1
          fi
          STATUS=$(git show "v$VERSION:$QA" | grep -m1 'Overall status' | sed 's/.*: *//')
          if ! echo "$STATUS" | grep -qiE 'PASS'; then
            echo "::error::QA status in tag is '$STATUS', not PASS."
            exit 1
          fi
          echo "QA gate: $STATUS"

      - name: Verify security gate from tag
        run: |
          SEC="SECURITY-v${VERSION}.md"
          if ! git show "v$VERSION:$SEC" > /dev/null 2>&1; then
            echo "::error::$SEC not found in tag v$VERSION"
            exit 1
          fi
          STATUS=$(git show "v$VERSION:$SEC" | grep -m1 'Overall status' | sed 's/.*: *//')
          if echo "$STATUS" | grep -qi 'BLOCKED'; then
            echo "::error::Security status in tag is BLOCKED."
            exit 1
          fi
          echo "Security gate: $STATUS"

      - name: Verify CI on tagged commit
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG_SHA=$(git rev-parse "v$VERSION")
          RESULT=$(gh run list --commit "$TAG_SHA" --workflow ci.yml --json conclusion --jq '.[0].conclusion // empty')
          if [ -z "$RESULT" ]; then
            echo "::error::No CI run found for tagged commit $TAG_SHA"
            exit 1
          fi
          if [ "$RESULT" != "success" ]; then
            echo "::error::CI on tagged commit is '$RESULT', not success."
            exit 1
          fi
          echo "CI gate: passing at $TAG_SHA"

      - name: Check if already published
        run: |
          CURRENT_REF=$(jq -r '.plugins[0].source.ref' .claude-plugin/marketplace.json)
          if [ "$CURRENT_REF" = "v$VERSION" ]; then
            echo "Marketplace already points to v$VERSION"
            echo "SKIP_PUBLISH=true" >> "$GITHUB_ENV"
          fi

      - name: Create and merge marketplace PR
        if: env.SKIP_PUBLISH != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="fix/marketplace-v$VERSION"
          git config user.name "factory-release-bot[bot]"
          git config user.email "factory-release-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          jq --arg ref "v$VERSION" \
            '(.plugins[] | select(.name == "factory") | .source.ref) = $ref' \
            .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json
          git add .claude-plugin/marketplace.json
          git commit -m "Update marketplace ref to v$VERSION"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Release v$VERSION: update marketplace ref" \
            --body "Points marketplace at v$VERSION. This is the go-live moment."
          gh pr merge "$BRANCH" --rebase --delete-branch --auto
          echo "Waiting for auto-merge..."
          for i in $(seq 1 30); do
            STATE=$(gh pr view "$BRANCH" --json state --jq .state 2>/dev/null || echo "UNKNOWN")
            if [ "$STATE" = "MERGED" ]; then break; fi
            sleep 5
          done
          echo "### Published v$VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "Marketplace now points to v$VERSION." >> "$GITHUB_STEP_SUMMARY"

  # --- Rollback ---
  rollback:
    if: inputs.action == 'rollback'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate inputs
        run: |
          if [ -z "$VERSION" ]; then
            echo "::error::version is required for rollback action"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format. Use semver: X.Y.Z"
            exit 1
          fi

      - name: Verify target tag exists
        run: |
          git fetch origin --tags
          if ! git tag -l "v$VERSION" | grep -q "v$VERSION"; then
            echo "::error::Tag v$VERSION does not exist"
            exit 1
          fi

      - name: Check if already rolled back
        run: |
          CURRENT_REF=$(jq -r '.plugins[0].source.ref' .claude-plugin/marketplace.json)
          if [ "$CURRENT_REF" = "v$VERSION" ]; then
            echo "Marketplace already points to v$VERSION"
            echo "SKIP_ROLLBACK=true" >> "$GITHUB_ENV"
          fi

      - name: Create and merge rollback PR
        if: env.SKIP_ROLLBACK != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="fix/rollback-to-v$VERSION"
          git config user.name "factory-release-bot[bot]"
          git config user.email "factory-release-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          jq --arg ref "v$VERSION" \
            '(.plugins[] | select(.name == "factory") | .source.ref) = $ref' \
            .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json
          git add .claude-plugin/marketplace.json
          git commit -m "Rollback marketplace ref to v$VERSION"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Rollback to v$VERSION" \
            --body "Reverts marketplace ref to v$VERSION."
          gh pr merge "$BRANCH" --rebase --delete-branch --auto
          echo "Waiting for auto-merge..."
          for i in $(seq 1 30); do
            STATE=$(gh pr view "$BRANCH" --json state --jq .state 2>/dev/null || echo "UNKNOWN")
            if [ "$STATE" = "MERGED" ]; then break; fi
            sleep 5
          done
          echo "### Rolled back to v$VERSION" >> "$GITHUB_STEP_SUMMARY"
