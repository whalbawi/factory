<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Factory — Idea to Production</title>
  <meta name="description"
        content="A pipeline of Claude Code skills that takes software products from idea to production.">
  <meta property="og:title" content="Factory">
  <meta property="og:description"
        content="Idea to production in one pipeline. 10 Claude Code skills for the full development lifecycle.">
  <meta property="og:url" content="https://whalbawi.github.io/factory">
  <meta property="og:type" content="website">
  <style>
    [data-theme="dark"] {
      --bg: #0a0a0a;
      --bg-secondary: #141414;
      --text: #fafafa;
      --text-secondary: #a0a0a0;
      --accent: #3b82f6;
      --border: #262626;
      --code-bg: #141414;
    }
    [data-theme="light"] {
      --bg: #fafafa;
      --bg-secondary: #f0f0f0;
      --text: #0a0a0a;
      --text-secondary: #666666;
      --accent: #2563eb;
      --border: #e0e0e0;
      --code-bg: #f0f0f0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    code, pre {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo,
                   Consolas, "Liberation Mono", monospace;
      font-size: 0.875rem;
    }
    a { color: var(--text-secondary); text-decoration: none;
        transition: color 0.15s; }
    a:hover { color: var(--text); }

    /* Icons */
    .icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      vertical-align: middle;
      fill: currentColor;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 640px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem;
      width: 100%;
    }
    .nav-right { display: flex; gap: 0.75rem; align-items: center; }
    .nav-right a { display: flex; align-items: center; }
    .nav-right a .icon { width: 20px; height: 20px; }
    #theme-toggle {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    #theme-toggle:hover { color: var(--text); }
    #theme-toggle .icon { width: 20px; height: 20px; }

    /* Main */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 1.5rem;
      width: 100%;
      flex: 1;
    }

    /* Hero */
    #hero {
      text-align: center;
      padding: 6rem 0 3rem;
    }
    #hero h1 {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.1;
    }
    .pitch {
      font-size: 1.125rem;
      color: var(--text-secondary);
      margin: 0.75rem 0 2.5rem;
      font-weight: 400;
    }

    /* Code blocks */
    pre {
      position: relative;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      line-height: 1.7;
      text-align: left;
    }
    .copy-btn {
      position: absolute;
      top: 0.625rem;
      right: 0.625rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.125rem;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .copy-btn:hover { color: var(--text); }
    .copy-btn .icon { width: 16px; height: 16px; }

    /* Pipeline */
    #pipeline {
      padding: 2.5rem 0;
      text-align: center;
    }
    .pipeline-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .pipeline-flow {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.375rem;
      align-items: center;
    }
    .skill-node {
      font-size: 0.8125rem;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo,
                   Consolas, "Liberation Mono", monospace;
      color: var(--text);
      padding: 0.25rem 0.625rem;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      white-space: nowrap;
    }
    .arrow {
      color: var(--border);
      font-size: 0.75rem;
    }

    /* Footer */
    footer {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      width: 100%;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--text-secondary); }

    @media (max-width: 480px) {
      #hero { padding: 3rem 0 2rem; }
      #hero h1 { font-size: 2.25rem; }
      .pitch { font-size: 1rem; margin-bottom: 2rem; }
      pre { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="https://whalbawi.github.io/factory" style="display:flex;align-items:center;gap:0.5rem;color:var(--text)">
        <svg width="24" height="20" viewBox="0 0 241 201" fill="currentColor" stroke="none">
          <rect x="0" y="80" width="240" height="120"/>
          <path d="M220 0L240 0L240 80L160 80L160 60Z"/>
          <path d="M140 0L160 0L160 80L80 80L80 60Z"/>
          <path d="M60 0L80 0L80 80L0 80L0 60Z"/>
        </svg>
        <span style="font-weight:600;letter-spacing:-0.02em;font-size:1.8rem;line-height:1">Factory</span>
      </a>
      <div class="nav-right">
        <a href="https://github.com/whalbawi/factory"
           aria-label="GitHub">
          <svg class="icon" viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47
              7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37
              -2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68
              -.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87
              2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64
              -3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0
              0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09
              2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08
              2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65
              3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0
              .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <button id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon sun" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon moon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3
              7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </div>
    </nav>
  </header>

  <main>
    <section id="hero">
      <h1>Factory</h1>
      <p class="pitch">Idea to production in one pipeline.</p>
      <p style="font-size:0.8125rem;color:var(--text-secondary);margin-bottom:0.75rem">
        Run in <a href="https://claude.com/claude-code"
        style="color:var(--accent)">Claude Code</a></p>
      <pre><code>/plugin marketplace add whalbawi/factory
/plugin install factory@factory-marketplace</code></pre>
    </section>

    <section id="pipeline">
      <p class="pipeline-label">The pipeline</p>
      <div class="pipeline-flow">
        <span class="skill-node" style="border-color:var(--accent);color:var(--accent)">factory</span>
        <span class="arrow">&rarr;</span>
        <span class="skill-node">ideation</span>
        <span class="arrow">&rarr;</span>
        <span class="skill-node">spec</span>
        <span class="arrow">&rarr;</span>
        <span class="skill-node">prototype</span>
        <span class="arrow">&rarr;</span>
        <span class="skill-node">setup</span>
        <span class="arrow">&rarr;</span>
        <span class="skill-node">build</span>
        <span class="arrow">&rarr;</span>
        <span class="skill-node">retro</span>
        <span class="arrow">&rarr;</span>
        <span class="skill-node">qa</span>
        <span class="arrow">&rarr;</span>
        <span class="skill-node">security</span>
        <span class="arrow">&rarr;</span>
        <span class="skill-node">deploy</span>
      </div>
    </section>

  </main>

  <footer>
    Built with <a href="https://claude.com/claude-code">Claude Code</a>
  </footer>

  <script>
    var toggle = document.getElementById('theme-toggle');
    var html = document.documentElement;
    var saved = localStorage.getItem('theme');
    if (saved) html.setAttribute('data-theme', saved);

    function updateIcon() {
      var dark = html.getAttribute('data-theme') === 'dark';
      toggle.querySelector('.sun').style.display = dark ? 'block' : 'none';
      toggle.querySelector('.moon').style.display = dark ? 'none' : 'block';
    }
    updateIcon();

    toggle.addEventListener('click', function() {
      var next = html.getAttribute('data-theme') === 'dark'
        ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateIcon();
    });

    document.querySelectorAll('pre').forEach(function(pre) {
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24" fill="none"'
        + ' stroke="currentColor" stroke-width="2" stroke-linecap="round"'
        + ' stroke-linejoin="round"><path d="M4 16c-1.1 0-2-.9-2-2V4c0'
        + '-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/><rect x="8" y="8" width="14"'
        + ' height="14" rx="2"/></svg>';
      btn.addEventListener('click', function() {
        navigator.clipboard.writeText(
          pre.querySelector('code').textContent
        );
        btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24"'
          + ' fill="none" stroke="currentColor" stroke-width="2"'
          + ' stroke-linecap="round" stroke-linejoin="round">'
          + '<polyline points="20 6 9 17 4 12"/></svg>';
        setTimeout(function() {
          btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24"'
            + ' fill="none" stroke="currentColor" stroke-width="2"'
            + ' stroke-linecap="round" stroke-linejoin="round">'
            + '<path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10'
            + 'c1.1 0 2 .9 2 2"/><rect x="8" y="8" width="14"'
            + ' height="14" rx="2"/></svg>';
        }, 1500);
      });
      pre.appendChild(btn);
    });
  </script>
</body>
</html>
